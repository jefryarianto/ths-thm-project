services:
  # PostgreSQL Database
  - type: pserv
    name: ths-thm-db
    plan: starter
    envVarKey: DATABASE_URL
    postgresMajorVersion: 16
    disk:
      name: data
      mountPath: /var/lib/postgresql/data
      sizeGB: 10

  # Backend API (NestJS)
  - type: web
    name: ths-thm-api
    runtime: node
    plan: standard
    rootDir: apps/api
    buildCommand: |
      corepack enable
      corepack prepare pnpm@latest --activate
      pnpm install --frozen-lockfile
      npx prisma generate
      pnpm run build
    startCommand: |
      npx prisma migrate deploy
      node dist/main.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ths-thm-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      - key: APP_PORT
        value: 3001
      - key: FRONTEND_URL
        fromService:
          name: ths-thm-web
          type: web
          property: url
      # Transactional email via Resend (recommended — generous free tier)
      # Replace legacy SMTP vars below with RESEND_API_KEY when migrating
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      # Firebase Cloud Messaging (FCM) — existing google-services.json configured
      - key: FCM_PROJECT_ID
        sync: false
      - key: FCM_PRIVATE_KEY
        sync: false
      - key: FCM_CLIENT_EMAIL
        sync: false
    disk:
      name: uploads
      mountPath: /opt/render/project/src/apps/api/uploads
      sizeGB: 5

  # Frontend Web (Next.js Static)
  - type: web
    name: ths-thm-web
    runtime: static
    plan: starter
    rootDir: apps/web
    buildCommand: |
      corepack enable
      corepack prepare pnpm@latest --activate
      pnpm install --frozen-lockfile
      pnpm run build
    staticPublishPath: .next
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: ths-thm-api
          type: web
          property: url
    routes:
      - type: rewrite
        source: /api/*
        destination: https://ths-thm-api.onrender.com/api/*
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /_next/static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable