services:
  postgres:
    image: postgres:16-alpine
    container_name: ths-thm-system-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ths_thm
      POSTGRES_PASSWORD: ths_thm_password
      POSTGRES_DB: ths_thm_db
    ports:
      - '54321:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ths_thm -d ths_thm_db']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ths-thm-system-api
    restart: unless-stopped
    ports:
      - '4000:3001'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://ths_thm:ths_thm_password@postgres:5432/ths_thm_db
      APP_PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3001/api/health']
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5
    command: node apps/api/dist/main.js

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: ths-thm-system-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5

volumes:
  postgres_data:
