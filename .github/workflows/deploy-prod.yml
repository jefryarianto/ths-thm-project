name: Deploy to Production (ths-thm.cloud)

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build & Deploy Production
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      # Setup
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      
      # Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      # Generate Prisma client
      - name: Generate Prisma client
        run: pnpm --filter @ths-thm/api prisma:generate
      
      # Build API Docker image
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # Build and push API image
      - name: Build and push API image
        id: build-api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
            ghcr.io/${{ github.repository }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      # Build and push Web image
      - name: Build and push Web image
        id: build-web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:${{ github.sha }}
            ghcr.io/${{ github.repository }}/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      # Deploy to VPS via SSH
      - name: Deploy to VPS (ths-thm.cloud)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.VPS_SSH_HOST }}
          username: ${{ vars.VPS_SSH_USERNAME }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ vars.VPS_SSH_PORT || '22' }}
          script: |
            set -e
            echo "🚀 Deploying production to ths-thm.cloud..."
            
            cd /opt/ths-thm
            
            # Pull latest images from GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            docker compose -f docker-compose.production.yml pull
            
            # Run database migrations
            docker compose -f docker-compose.production.yml run --rm api npx prisma migrate deploy
            
            # Restart services (web first, then api for zero-downtime)
            docker compose -f docker-compose.production.yml up -d --remove-orphans web
            sleep 5
            docker compose -f docker-compose.production.yml up -d --remove-orphans --force-recreate api
            
            # Wait for API health check
            echo "⏳ Waiting for API to be healthy..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3001/api/health > /dev/null 2>&1; then
                echo "✅ API is healthy"
                break
              fi
              echo "  Attempt $i/30 — waiting..."
              sleep 5
            done
            
            # Final health verification
            response=$(curl -sf http://localhost:3001/api/health || echo "")
            if echo "$response" | grep -q '"status":"ok"'; then
              echo "✅ Production deployment successful!"
              echo "🌐 URL: https://ths-thm.cloud"
            else
              echo "❌ Production health check failed"
              docker compose -f docker-compose.production.yml logs api --tail=100
              exit 1
            fi
