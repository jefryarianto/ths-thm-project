name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  TZ: 'Asia/Makassar'

jobs:
  api-test:
    name: API — TypeCheck & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ths_thm
          POSTGRES_PASSWORD: ths_thm_secret
          POSTGRES_DB: ths_thm_db
        options: >-
          --health-cmd "pg_isready -U ths_thm -d ths_thm_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      valkey:
        image: valkey/valkey:8-alpine
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

      - name: Install pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @ths-thm/api exec prisma generate

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://ths_thm:ths_thm_secret@localhost:5432/ths_thm_db?schema=public
        run: pnpm --filter @ths-thm/api exec prisma migrate deploy

      - name: Seed database
        env:
          DATABASE_URL: postgresql://ths_thm:ths_thm_secret@localhost:5432/ths_thm_db?schema=public
          REDIS_URL: redis://localhost:6379
        run: pnpm --filter @ths-thm/api exec tsx prisma/seed.ts
        continue-on-error: true

      - name: Build @ths-thm/shared
        run: pnpm --filter @ths-thm/shared build

      - name: Build @ths-thm/templates
        run: pnpm --filter @ths-thm/templates build

      - name: TypeScript check
        run: pnpm --filter @ths-thm/api exec tsc --noEmit

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://ths_thm:ths_thm_secret@localhost:5432/ths_thm_db?schema=public
          REDIS_URL: redis://localhost:6379
        run: pnpm --filter @ths-thm/api test

      - name: Run E2E tests
        env:
          DATABASE_URL: postgresql://ths_thm:ths_thm_secret@localhost:5432/ths_thm_db?schema=public
          REDIS_URL: redis://localhost:6379
          NODE_OPTIONS: '--experimental-vm-modules'
        run: pnpm --filter @ths-thm/api test:e2e
        continue-on-error: true

  web-admin-test:
    name: Web-Admin — TypeCheck & Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

      - name: Install pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @ths-thm/shared
        run: pnpm --filter @ths-thm/shared build

      - name: TypeScript check
        run: pnpm --filter @ths-thm/web-admin exec tsc --noEmit

      - name: Run vitest unit tests
        run: pnpm --filter @ths-thm/web-admin exec vitest run

      - name: Next.js build
        run: pnpm --filter @ths-thm/web-admin build

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

      - name: Install pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm exec prettier --check "**/*.{ts,tsx,js,jsx,json,md}" || echo "Prettier not installed — skipping format check"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [api-test, web-admin-test]
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

- name: Setup SSH Agent
        run: |
          set -e
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_ed25519

      - name: Test SSH port reachability
        run: |
          if [ -z "${{ secrets.STAGING_HOST }}" ] || [ -z "${{ secrets.STAGING_PORT }}" ]; then
            echo "Missing STAGING_HOST or STAGING_PORT"
            exit 1
          fi
          echo "Testing connectivity to ${{ secrets.STAGING_HOST }}:${{ secrets.STAGING_PORT }}..."
          nc -z -w 10 ${{ secrets.STAGING_HOST }} ${{ secrets.STAGING_PORT }} || (echo "Port unreachable" && exit 1)

      - name: Test SSH authentication
        run: ssh -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 -p ${{ secrets.STAGING_PORT }} ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} "echo 'SSH OK'"

      - name: Deploy via SSH
        run: |
          set -e
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 -p ${{ secrets.STAGING_PORT }} ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} <<'EOF'
            set -e
            cd ${{ secrets.STAGING_PATH || '/opt/ths-thm' }}
            git fetch origin main
            git reset --hard origin/main

            COMPOSE_FILES="-f infra/docker/docker-compose.yml -f infra/docker/docker-compose.staging.yml"

            docker compose $COMPOSE_FILES build --pull
            docker compose $COMPOSE_FILES up -d --remove-orphans

            echo ">>> Running database migrations..."
            docker compose $COMPOSE_FILES exec -T -w /app/apps/api api npx prisma migrate deploy

            echo ">>> Seeding database..."
            docker compose $COMPOSE_FILES exec -T -w /app/apps/api api npx prisma db seed || true

            docker system prune -f

            echo ">>> Checking running containers..."
            docker compose $COMPOSE_FILES ps
          EOF

      - name: Health Check
        run: |
          sleep 15
          echo "Checking API health..."
          curl -sSf -o /dev/null -w "Health: %{http_code}\n" \
            "https://${{ secrets.STAGING_DOMAIN }}/api/v1/health"
          echo "Deployment verified successfully!"

# no-op: retrigger deploy
