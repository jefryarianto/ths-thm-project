version: '3.8'

# Staging environment for ths-thm.cloud
# Usage: docker compose -f docker-compose.staging.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: ths-thm-staging-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ths_thm_staging
      POSTGRES_PASSWORD: ${STAGING_DB_PASSWORD:-staging_password_change_me}
      POSTGRES_DB: ths_thm_staging
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ths_thm_staging -d ths_thm_staging']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ths-thm-staging

  api:
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_REPO:-jefryarianto/ths-thm-system}/api:${IMAGE_TAG:-latest}
    container_name: ths-thm-staging-api
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3001/api/health']
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    environment:
      DATABASE_URL: postgresql://ths_thm_staging:${STAGING_DB_PASSWORD:-staging_password_change_me}@postgres:5432/ths_thm_staging
      JWT_SECRET: ${STAGING_JWT_SECRET}
      JWT_REFRESH_SECRET: ${STAGING_JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      APP_PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: https://staging.ths-thm.cloud
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID}
      FCM_PRIVATE_KEY: ${FCM_PRIVATE_KEY}
      FCM_CLIENT_EMAIL: ${FCM_CLIENT_EMAIL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ths-thm-staging

  web:
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_REPO:-jefryarianto/ths-thm-system}/web:${IMAGE_TAG:-latest}
    container_name: ths-thm-staging-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://staging.ths-thm.cloud/api
    depends_on:
      - api
    networks:
      - ths-thm-staging

  nginx:
    image: nginx:alpine
    container_name: ths-thm-staging-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - web
    networks:
      - ths-thm-staging

volumes:
  staging_postgres_data:

networks:
  ths-thm-staging:
    driver: bridge
