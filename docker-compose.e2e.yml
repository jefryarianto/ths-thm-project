services:
  postgres-e2e:
    image: postgres:16-alpine
    container_name: ths-thm-e2e-db
    environment:
      POSTGRES_USER: ths_thm
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: ths_thm_e2e
    ports:
      - '5434:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ths_thm -d ths_thm_e2e']
      interval: 2s
      timeout: 3s
      retries: 10

  api-e2e:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ths-thm-e2e-api
    environment:
      DATABASE_URL: postgresql://ths_thm:test_password@postgres-e2e:5432/ths_thm_e2e
      JWT_SECRET: test-jwt-secret
      JWT_REFRESH_SECRET: test-jwt-refresh-secret
      APP_PORT: 3001
      NODE_ENV: production
      STRIPE_SECRET_KEY: sk_test_dummy
      STRIPE_WEBHOOK_SECRET: whsec_dummy
    ports:
      - '4002:3001'
    depends_on:
      postgres-e2e:
        condition: service_healthy
    command: >
      sh -c "
        cd apps/api && npx prisma migrate reset --force &&
        cd /app && node apps/api/dist/main.js
      "

  web-e2e:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.e2e
    container_name: ths-thm-e2e-web
    environment:
      NEXT_PUBLIC_API_URL: http://api-e2e:3001
      E2E_BASE_URL: http://localhost:3002
      NODE_ENV: test
    ports:
      - '3002:3000'
    depends_on:
      - api-e2e

  playwright-e2e:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    container_name: ths-thm-e2e-runner
    working_dir: /app/apps/web
    volumes:
      - .:/app
    environment:
      E2E_BASE_URL: http://web-e2e:3000
    depends_on:
      web-e2e:
        condition: service_started
    command: >
      sh -c "
        npm_config_ignore_scripts=true npx playwright install --with-deps chromium &&
        npx playwright test
      "
