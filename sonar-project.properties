# SonarQube configuration for THS-THM Management System
sonar.projectKey=ths-thm
sonar.projectName=THS-THM Management System
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=apps/api/src,apps/web-admin/src,packages/shared/src,packages/ui/src,packages/templates/src

# Test directories
sonar.tests=apps/api/src,apps/web-admin/src

# Test file patterns
sonar.test.inclusions=**/*.spec.ts,**/*.test.tsx,**/*.test.ts

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.config.*,**/storybook-static/**,**/test-results/**
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/__tests__/**,**/*.spec.ts,**/*.test.ts,**/*.test.tsx

# TypeScript configuration
sonar.typescript.lcov.reportPaths=apps/api/coverage/lcov.info,apps/web-admin/coverage/lcov.info

# Jest configuration (for unit test reports)
sonar.javascript.jest.reportPaths=apps/api/coverage/test-report.xml

# Quality gates
sonar.coverage.exclusions=\
  **/*.module.ts,\
  **/main.ts,\
  **/helmet.config.ts,\
  **/test/mocks/**,**/test/**/*.mock.ts,\
  **/__tests__/**,\
  **/integration/**/*.integration.spec.ts,\
  **/*.config.ts,\
  **/*.d.ts,\
  **/index.ts

# Source encoding
sonar.sourceEncoding=UTF-8
