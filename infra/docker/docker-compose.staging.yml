# Docker Compose staging override
# Usage:
#   docker compose -f infra/docker/docker-compose.yml -f infra/docker/docker-compose.staging.yml up -d
#   bash infra/docker/scripts/staging-init.sh    # first-time setup (migrate + seed)
#
# Build after dependency changes:
#   docker compose -f infra/docker/docker-compose.yml -f infra/docker/docker-compose.staging.yml build

services:
  api:
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=staging
      - JWT_SECRET=${JWT_SECRET:-staging-jwt-secret-change-in-production}
      - API_PORT=4000
      # Database — uses internal Docker network
      - DATABASE_URL=postgresql://ths_thm:ths_thm_secret@postgres:5432/ths_thm_db?schema=public
      - REDIS_URL=redis://valkey:6379
      # MinIO — internal Docker network
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=ths-thm-docs
      - MINIO_USE_SSL=false

  web-admin:
    image: ghcr.io/${DOCKERHUB_USER:-jefryarianto}/ths-thm-web-admin:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=staging
      - NEXT_PUBLIC_APP_NAME=THS-THM Admin (Staging)

  nginx:
    ports:
      - "80:80"
