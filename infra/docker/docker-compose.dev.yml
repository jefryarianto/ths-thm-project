# Development override — enables hot-reload with volume mounts
# Usage: docker compose -f infra/docker/docker-compose.yml -f infra/docker/docker-compose.dev.yml up
# Rebuild after dependency changes: docker compose -f infra/docker/docker-compose.yml -f infra/docker/docker-compose.dev.yml build

services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile.dev
    volumes:
      # Mount source code for hot-reload (tsc --watch recompiles on changes)
      - ../../apps/api/src:/app/apps/api/src
      - ../../packages/shared/src:/app/packages/shared/src
      - ../../packages/templates/src:/app/packages/templates/src
      # Mount config files so tsconfig changes are reflected
      - ../../apps/api/tsconfig.json:/app/apps/api/tsconfig.json
      - ../../apps/api/tsconfig.build.json:/app/apps/api/tsconfig.build.json
      - ../../apps/api/nest-cli.json:/app/apps/api/nest-cli.json
      - ../../tsconfig.base.json:/app/tsconfig.base.json
      # Mount .env for local environment configuration
      - ../../apps/api/.env:/app/apps/api/.env
      # Anonymous volumes preserve container's node_modules (prevent host override)
      - /app/apps/api/node_modules
      - /app/packages/shared/node_modules
      - /app/packages/templates/node_modules
      - /app/node_modules
    command: pnpm --filter @ths-thm/api run dev:docker
    environment:
      - NODE_ENV=development
    restart: "no"

  web-admin:
    build:
      context: ../..
      dockerfile: apps/web-admin/Dockerfile.dev
    volumes:
      # Mount source code for hot-reload (Next.js handles HMR)
      - ../../apps/web-admin/src:/app/apps/web-admin/src
      - ../../apps/web-admin/public:/app/apps/web-admin/public
      - ../../packages/shared/src:/app/packages/shared/src
      - ../../packages/ui/src:/app/packages/ui/src
      # Mount config files
      - ../../apps/web-admin/next.config.ts:/app/apps/web-admin/next.config.ts
      - ../../apps/web-admin/tailwind.config.ts:/app/apps/web-admin/tailwind.config.ts
      - ../../apps/web-admin/postcss.config.mjs:/app/apps/web-admin/postcss.config.mjs
      - ../../apps/web-admin/tsconfig.json:/app/apps/web-admin/tsconfig.json
      - ../../tsconfig.base.json:/app/tsconfig.base.json
      # Anonymous volumes preserve container's node_modules
      - /app/apps/web-admin/node_modules
      - /app/packages/shared/node_modules
      - /app/packages/ui/node_modules
      - /app/node_modules
    command: pnpm --filter @ths-thm/web-admin dev
    environment:
      - NODE_ENV=development
    restart: "no"
