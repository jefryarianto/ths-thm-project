# THS-THM Deployment via Pre-built Images (ghcr.io)
# ==================================================
# Usage (VPS):
#   docker compose -f infra/docker/docker-compose.registry.yml pull
#   docker compose -f infra/docker/docker-compose.registry.yml up -d
#
# Build & push from local machine first:
#   .\scripts\deploy.ps1
#
# Prerequisites:
#   - docker login ghcr.io -u jefryarianto --password-stdin
#   - Domain: api.ths-thm.cloud dan admin.ths-thm.cloud pointing ke VPS

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432"
    environment:
      POSTGRES_USER: ths_thm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ths_thm_secret}
      POSTGRES_DB: ths_thm_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ths_thm -d ths_thm_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - ths-thm-network

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    ports:
      - "6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ths-thm-network

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000"
      - "9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ths-thm-network

  api:
    image: ghcr.io/jefryarianto/ths-thm-api:latest
    restart: unless-stopped
    ports:
      - "4000"
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: "postgresql://ths_thm:${POSTGRES_PASSWORD:-ths_thm_secret}@postgres:5432/ths_thm_db?schema=public"
      REDIS_URL: "redis://valkey:6379"
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY: "15m"
      JWT_REFRESH_EXPIRY: "7d"
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ths-thm-docs
      MINIO_USE_SSL: "false"
      S3_REGION: auto
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      CORS_ORIGIN: "https://admin.ths-thm.cloud"
      TRUST_PROXY: "1"
      DOCUMENTS_STORAGE: minio
      UPLOAD_DIR: ./uploads
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ths-thm-network
      - dokploy-network

  web-admin:
    image: ghcr.io/jefryarianto/ths-thm-web-admin:latest
    restart: unless-stopped
    ports:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_NAME: "THS-THM Admin"
    depends_on:
      - api
    networks:
      - ths-thm-network
      - dokploy-network

volumes:
  postgres_data:
  valkey_data:
  minio_data:

networks:
  ths-thm-network:
  dokploy-network:
    external: true
