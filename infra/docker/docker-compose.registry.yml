services:
  postgres:
    image: postgres:16-alpine
    container_name: ths-thm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ths_thm
      POSTGRES_PASSWORD: ths_thm_secret
      POSTGRES_DB: ths_thm_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ths_thm -d ths_thm_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - ths-thm-network

  valkey:
    image: valkey/valkey:8-alpine
    container_name: ths-thm-valkey
    restart: unless-stopped
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ths-thm-network

  minio:
    image: minio/minio:latest
    container_name: ths-thm-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ths-thm-network

  api:
    image: ${DOCKERHUB_USER:-jefryarianto}/ths-thm-api:latest
    container_name: ths-thm-api
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      API_PORT: 4000
      DATABASE_URL: "postgresql://ths_thm:ths_thm_secret@postgres:5432/ths_thm_db?schema=public"
      REDIS_URL: "redis://valkey:6379"
      JWT_SECRET: ${JWT_SECRET:-staging-jwt-secret-change-me}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: ths-thm-docs
      MINIO_USE_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ths-thm-network
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.ths-thm.cloud`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=4000"

  web-admin:
    image: ${DOCKERHUB_USER:-jefryarianto}/ths-thm-web-admin:latest
    container_name: ths-thm-web-admin
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      NEXT_PUBLIC_APP_NAME: "THS-THM Admin (Staging)"
    depends_on:
      - api
    networks:
      - ths-thm-network
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`admin.ths-thm.cloud`)"
      - "traefik.http.routers.admin.entrypoints=websecure"
      - "traefik.http.routers.admin.tls=true"
      - "traefik.http.routers.admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.admin.loadbalancer.server.port=3000"

volumes:
  postgres_data:
  valkey_data:
  minio_data:

networks:
  ths-thm-network:
  traefik-network:
    external: true