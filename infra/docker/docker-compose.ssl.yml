# Docker Compose SSL override for production
# Usage:
#   docker compose -f infra/docker/docker-compose.yml -f infra/docker/docker-compose.ssl.yml up -d
#
# Prerequisites:
#   1. Point your domain DNS to the server IP
#   2. Ensure ports 80 and 443 are open in firewall
#   3. Run Certbot to obtain certificates first:
#      docker compose -f infra/docker/docker-compose.yml -f infra/docker/docker-compose.ssl.yml run --rm certbot
#
# Certificate renewal:
#   docker compose -f infra/docker/docker-compose.yml -f infra/docker/docker-compose.ssl.yml run --rm certbot renew

services:
  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.ssl.conf:/etc/nginx/conf.d/default.conf:ro
      # Let's Encrypt certificates (shared volume)
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - api
      - web-admin

  certbot:
    image: certbot/certbot:latest
    container_name: ths-thm-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "
      trap exit TERM;
      while true; do
        certbot renew --quiet --no-self-upgrade;
        sleep 12h;
      done
      "
    # Alternative: run once to obtain certificate:
    # certbot certonly --webroot -w /var/www/certbot -d admin.example.com -d api.example.com
    profiles:
      - certbot

volumes:
  certbot_www:
  certbot_conf:
