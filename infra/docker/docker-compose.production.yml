# THS-THM Production Deployment dengan Traefik SSL
# ==================================================
# Usage:
#   docker compose -f infra/docker/docker-compose.production.yml up -d --build
#
# Prerequisites:
#   - Traefik sudah berjalan di network "traefik-network"
#   - Domain: api.ths-thm.cloud dan admin.ths-thm.cloud pointing ke VPS

services:
  postgres:
    image: postgres:16-alpine
    container_name: ths-thm-postgres
    restart: unless-stopped
    ports:
      - "5432"
    environment:
      POSTGRES_USER: ths_thm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ths_thm_secret}
      POSTGRES_DB: ths_thm_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ths_thm -d ths_thm_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - ths-thm-network

  valkey:
    image: valkey/valkey:8-alpine
    container_name: ths-thm-valkey
    restart: unless-stopped
    ports:
      - "6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ths-thm-network

  minio:
    image: minio/minio:latest
    container_name: ths-thm-minio
    restart: unless-stopped
    ports:
      - "9000"
      - "9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ths-thm-network

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: ths-thm-api
    restart: unless-stopped
    ports:
      - "4000"
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: "postgresql://ths_thm:${POSTGRES_PASSWORD:-ths_thm_secret}@postgres:5432/ths_thm_db?schema=public"
      REDIS_URL: "redis://valkey:6379"
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY: "15m"
      JWT_REFRESH_EXPIRY: "7d"
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ths-thm-docs
      MINIO_USE_SSL: "false"
      S3_REGION: auto
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      CORS_ORIGIN: "https://admin.ths-thm.cloud"
      TRUST_PROXY: "1"
      DOCUMENTS_STORAGE: minio
      UPLOAD_DIR: ./uploads
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "true"
      CHROMIUM_PATH: /usr/bin/chromium-browser
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.ths-thm.cloud`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=4000"
    networks:
      - ths-thm-network
      - traefik-network

  web-admin:
    build:
      context: ../..
      dockerfile: apps/web-admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "https://api.ths-thm.cloud/api/v1"
    container_name: ths-thm-web-admin
    restart: unless-stopped
    ports:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: "https://api.ths-thm.cloud/api/v1"
      NEXT_PUBLIC_APP_NAME: "THS-THM Admin"
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`admin.ths-thm.cloud`)"
      - "traefik.http.routers.admin.entrypoints=websecure"
      - "traefik.http.routers.admin.tls=true"
      - "traefik.http.routers.admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.admin.loadbalancer.server.port=3000"
    networks:
      - ths-thm-network
      - traefik-network

volumes:
  postgres_data:
  valkey_data:
  minio_data:

networks:
  ths-thm-network:
  traefik-network:
    external: true