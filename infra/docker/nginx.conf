# Docker DNS resolver — needed for dynamic upstream resolution
resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    server_name _;  # catch-all — accepts any hostname (localhost, IP, domain)

    # Web Admin
    location / {
        set $web_upstream http://web-admin:3000;
        proxy_pass $web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # API — rewrites /api/* to /api/v1/* to match NestJS globalPrefix
    # Handles both /api/auth/login and /api/v1/auth/login (prevents double prefix)
    location /api/ {
        rewrite ^/api/v1/(.*)$ /api/v1/$1 break;
        rewrite ^/api/(.*)$ /api/v1/$1 break;
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # MinIO Console
    location /minio/ {
        set $minio_upstream http://minio:9001;
        proxy_pass $minio_upstream;
        proxy_set_header Host $host;
    }

    # Swagger Docs — at /api/docs/ (not under api/v1 prefix)
    location /docs/ {
        proxy_pass http://api:4000/api/docs/;
        proxy_set_header Host $host;
    }
    location = /docs {
        return 302 /docs/;
    }
}
