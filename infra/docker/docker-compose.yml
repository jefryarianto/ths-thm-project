services:
  postgres:
    image: postgres:16-alpine
    container_name: ths-thm-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ths_thm
      POSTGRES_PASSWORD: ths_thm_secret
      POSTGRES_DB: ths_thm_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ths_thm -d ths_thm_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - ths-thm-network

  valkey:
    image: valkey/valkey:8-alpine
    container_name: ths-thm-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ths-thm-network

  minio:
    image: minio/minio:latest
    container_name: ths-thm-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ths-thm-network

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: ths-thm-api
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://ths_thm:ths_thm_secret@postgres:5432/ths_thm_db?schema=public"
      REDIS_URL: "redis://valkey:6379"
      JWT_SECRET: "docker-secret-change-in-production"
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: ths-thm-docs
      API_PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-staging.rule=Host(`api-staging.ths-thm.cloud`)"
      - "traefik.http.routers.api-staging.entrypoints=websecure"
      - "traefik.http.routers.api-staging.tls=true"
      - "traefik.http.routers.api-staging.tls.certresolver=letsencrypt"
      - "traefik.http.services.api-staging.loadbalancer.server.port=4000"
    networks:
      - ths-thm-network
      - traefik-network

  web-admin:
    build:
      context: ../..
      dockerfile: apps/web-admin/Dockerfile
    container_name: ths-thm-web-admin
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:80/api"
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin-staging.rule=Host(`admin-staging.ths-thm.cloud`)"
      - "traefik.http.routers.admin-staging.entrypoints=websecure"
      - "traefik.http.routers.admin-staging.tls=true"
      - "traefik.http.routers.admin-staging.tls.certresolver=letsencrypt"
      - "traefik.http.services.admin-staging.loadbalancer.server.port=3000"
    networks:
      - ths-thm-network
      - traefik-network

volumes:
  postgres_data:
  valkey_data:
  minio_data:

networks:
  ths-thm-network:
  traefik-network:
    external: true
