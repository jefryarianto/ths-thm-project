packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  '@firebase/util': true
  '@nestjs/core': true
  core-js-pure: true
  msw: true

onlyBuiltDependencies:
  - "@firebase/util"
  - "@react-native-firebase/app"
  - "@react-native-firebase/messaging"
  - "@nestjs/core"
  - "@prisma/client"
  - "@prisma/engines"
  - "@scarf/scarf"
  - bcrypt
  - esbuild
  - expo-modules-core
  - expo
  - prisma
  - protobufjs
  - react-native
  - sharp
