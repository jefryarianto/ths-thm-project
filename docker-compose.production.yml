version: '3.8'

# Production environment for ths-thm.cloud
# Usage: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: ths-thm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ths_thm
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ths_thm_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ths_thm -d ths_thm_db']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ths-thm-network

  api:
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_REPO:-jefryarianto/ths-thm-system}/api:${IMAGE_TAG:-latest}
    container_name: ths-thm-api
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3001/api/health']
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    environment:
      DATABASE_URL: postgresql://ths_thm:${DB_PASSWORD}@postgres:5432/ths_thm_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      APP_PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: https://ths-thm.cloud
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID}
      FCM_PRIVATE_KEY: ${FCM_PRIVATE_KEY}
      FCM_CLIENT_EMAIL: ${FCM_CLIENT_EMAIL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ths-thm-network

  web:
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_REPO:-jefryarianto/ths-thm-system}/web:${IMAGE_TAG:-latest}
    container_name: ths-thm-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://ths-thm.cloud/api
    depends_on:
      - api
    networks:
      - ths-thm-network

  nginx:
    image: nginx:alpine
    container_name: ths-thm-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/ssl-certs:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
    networks:
      - ths-thm-network

volumes:
  postgres_data:

networks:
  ths-thm-network:
    driver: bridge
